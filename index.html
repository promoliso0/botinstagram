<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromoLiso — Ofertas do dia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: #F0EEF6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: #7B2FBE;
    padding: 36px 20px 44px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .logo-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #3D1278;
    border-radius: 50px;
    padding: 12px 28px;
    margin-bottom: 12px;
  }
  .logo-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 1;
  }
  .logo-promo { color: #fff; }
  .logo-liso  { color: #A8FF3E; }
  .logo-bag   { font-size: 24px; }
  .header-tagline {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .header-count {
    display: inline-block;
    margin-top: 14px;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 20px;
  }

  /* ── LISTA ── */
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-left: 4px;
  }

  /* ── CARD ── */
  .promo-card {
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    align-items: stretch;
    margin-bottom: 12px;
    border: 1px solid rgba(0,0,0,0.06);
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .promo-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123,47,190,0.12); }
  .promo-card.expirada { opacity: 0.5; pointer-events: none; }

  .card-img {
    width: 100px;
    min-height: 100px;
    flex-shrink: 0;
    background: #f5f3fa;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .card-body {
    padding: 14px 16px;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card-top { margin-bottom: 8px; }
  .card-time {
    font-size: 10px;
    color: #bbb;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .card-time.expired { color: #F0354B; }
  .card-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: #1a1a1a;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-prices {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .price-old {
    font-size: 11px;
    color: #bbb;
    text-decoration: line-through;
  }
  .price-new {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: #1a1a1a;
    line-height: 1;
  }
  .disc-badge {
    background: #F0354B;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .coupon-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #F3EAFF;
    border: 1.5px dashed #9B4DCA;
    border-radius: 8px;
    padding: 4px 10px;
    margin-bottom: 10px;
  }
  .coupon-label { font-size: 10px; color: #7B2FBE; font-weight: 600; }
  .coupon-code  { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 13px; color: #7B2FBE; letter-spacing: 1px; }

  .card-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: #7B2FBE;
    color: #fff;
    border-radius: 10px;
    padding: 9px 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 13px;
  }
  .card-btn.expired { background: #ccc; }

  /* ── EMPTY / LOADING ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #bbb;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; font-weight: 600; }

  .skeleton {
    background: linear-gradient(90deg, #ececec 25%, #f5f5f5 50%, #ececec 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<div class="header">
  <div class="logo-pill">
    <span class="logo-text"><span class="logo-promo">Promo</span><span class="logo-liso">Liso</span></span>
    <span class="logo-bag">🛍️</span>
  </div>
  <div class="header-tagline">Promoções atualizadas em tempo real</div>
  <div class="header-count" id="count">Carregando...</div>
</div>

<div class="container">
  <div class="section-label">Ofertas de hoje</div>
  <div id="lista">
    <!-- Skeletons enquanto carrega -->
    <div class="promo-card" style="pointer-events:none">
      <div class="card-img" style="background:#ececec"></div>
      <div class="card-body" style="gap:8px">
        <div class="skeleton" style="height:14px;width:80%"></div>
        <div class="skeleton" style="height:24px;width:50%"></div>
        <div class="skeleton" style="height:36px;width:100%"></div>
      </div>
    </div>
    <div class="promo-card" style="pointer-events:none;opacity:0.6">
      <div class="card-img" style="background:#ececec"></div>
      <div class="card-body" style="gap:8px">
        <div class="skeleton" style="height:14px;width:70%"></div>
        <div class="skeleton" style="height:24px;width:45%"></div>
        <div class="skeleton" style="height:36px;width:100%"></div>
      </div>
    </div>
  </div>
</div>

<script>
const EMOJIS = { default:'🛒', phone:'📱', notebook:'💻', fone:'🎧', tv:'📺', watch:'⌚', camera:'📷', tablet:'📱', geladeira:'🧊', ar:'❄️' };

function getEmoji(nome) {
  const n = nome.toLowerCase();
  if (n.includes('celular') || n.includes('smartphone') || n.includes('galaxy') || n.includes('iphone')) return '📱';
  if (n.includes('notebook') || n.includes('laptop')) return '💻';
  if (n.includes('fone') || n.includes('headphone') || n.includes('earphone') || n.includes('airpod')) return '🎧';
  if (n.includes('tv') || n.includes('televisão') || n.includes('smart tv')) return '📺';
  if (n.includes('watch') || n.includes('smartwatch') || n.includes('relogio')) return '⌚';
  if (n.includes('camera') || n.includes('câmera')) return '📷';
  if (n.includes('tablet') || n.includes('ipad')) return '🖥️';
  if (n.includes('geladeira') || n.includes('frigobar')) return '🧊';
  if (n.includes('ar condicionado')) return '❄️';
  if (n.includes('perfume') || n.includes('maquiagem')) return '💄';
  if (n.includes('tenis') || n.includes('sapato') || n.includes('tênis')) return '👟';
  return '🛒';
}

function tempoDecorrido(ts) {
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  if (min < 1) return 'agora mesmo';
  if (min < 60) return `há ${min} min`;
  if (h < 24) return `há ${h}h`;
  return `há ${Math.floor(h/24)}d`;
}

async function carregarPromos() {
  try {
    const res = await fetch('/api/promos');
    const promos = await res.json();
    renderizar(promos);
  } catch(e) {
    document.getElementById('lista').innerHTML = `
      <div class="empty">
        <div class="empty-icon">😕</div>
        <div class="empty-text">Erro ao carregar promoções</div>
      </div>`;
  }
}

function renderizar(promos) {
  const ativas = promos.filter(p => !p.expirada);
  const expiradas = promos.filter(p => p.expirada);

  const countEl = document.getElementById('count');
  countEl.textContent = ativas.length > 0
    ? `${ativas.length} oferta${ativas.length > 1 ? 's' : ''} ativa${ativas.length > 1 ? 's' : ''} agora`
    : 'Nenhuma oferta no momento';

  const lista = document.getElementById('lista');

  if (promos.length === 0) {
    lista.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🛍️</div>
        <div class="empty-text">Nenhuma promoção ainda.<br>Volte em breve!</div>
      </div>`;
    return;
  }

  lista.innerHTML = [...ativas, ...expiradas].map(p => `
    <a class="promo-card ${p.expirada ? 'expirada' : ''}" href="${p.linkCompra}" target="_blank" rel="noopener">
      <div class="card-img">${getEmoji(p.nomeProduto)}</div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-time ${p.expirada ? 'expired' : ''}">${p.expirada ? 'expirada' : tempoDecorrido(p.timestamp)}</div>
          <div class="card-name">${p.nomeProduto}</div>
        </div>
        <div>
          <div class="card-prices">
            ${p.precoAntigo ? `<span class="price-old">R$ ${p.precoAntigo}</span>` : ''}
            <span class="price-new">R$ ${p.precoNovo}</span>
            ${p.desconto ? `<span class="disc-badge">${p.desconto}% OFF</span>` : ''}
          </div>
          ${p.cupom ? `
          <div class="coupon-chip">
            <span class="coupon-label">Cupom:</span>
            <span class="coupon-code">${p.cupom}</span>
          </div>` : ''}
          <div class="card-btn ${p.expirada ? 'expired' : ''}">
            ${p.expirada ? 'Expirada' : 'Ver oferta →'}
          </div>
        </div>
      </div>
    </a>
  `).join('');
}

carregarPromos();
// Atualiza automaticamente a cada 30 segundos
setInterval(carregarPromos, 30000);
</script>
</body>
</html>
